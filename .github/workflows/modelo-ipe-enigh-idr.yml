name: Modelo IPE - ENIGH IDR Fase 2

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests openpyxl pyarrow

      - name: Ejecutar freeze, catálogo y piloto
        run: python pipeline_modelo_ipe_idr.py

      - name: Publicar entregables
        uses: actions/upload-artifact@v4
        with:
          name: modelo-ipe-idr-fase2
          path: output/
          if-no-files-found: error
          compression-level: 0
          retention-days: 2
